<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>示例扩展</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8f8f8;
        --fg: #333333;
        --secondary: #6b6b6b;
      }
      html.dark {
        color-scheme: dark;
        --bg: #181818;
        --fg: #d4d4d4;
        --secondary: #909399;
      }
      body {
        font:
          13px/1.45 system-ui,
          sans-serif;
        margin: 12px;
        background: transparent;
        background: var(--bg);
        color: var(--fg);
      }
      h1 {
        font-size: 14px;
        margin: 0 0 8px;
      }
      #log {
        white-space: pre-wrap;
        font-size: 11px;
        opacity: 0.85;
        max-height: 240px;
        overflow: auto;
        color: var(--secondary);
      }
      button {
        margin: 4px 8px 4px 0;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>ColorTxt 示例扩展</h1>
    <p>
      使用 postMessage 调用宿主 API（参见
      <code>@colortxt/extension-api</code>）。
    </p>
    <div>
      <button type="button" id="btnChapters">获取章节</button>
      <button type="button" id="btnChapterText">当前章正文</button>
    </div>
    <div id="log"></div>
    <script>
      const REQ = "colortxt/ext:request";
      const RES = "colortxt/ext:response";
      const EVT = "colortxt/ext:event";
      const INIT = "colortxt/ext:init";
      let seq = 0;
      const pending = new Map();

      function log(line) {
        const el = document.getElementById("log");
        el.textContent += line + "\n";
      }

      window.addEventListener("message", (ev) => {
        const d = ev.data;
        if (!d || typeof d !== "object") return;
        if (d.type === INIT) {
          log("[init] extId=" + d.extId + " viewId=" + d.viewId);
          return;
        }
        if (d.type === EVT) {
          log("[event] " + d.event + " " + JSON.stringify(d.payload ?? null));
          return;
        }
        if (d.type === RES && typeof d.id === "string") {
          const p = pending.get(d.id);
          pending.delete(d.id);
          if (!p) return;
          if (d.ok) p.resolve(d.result);
          else p.reject(new Error(d.error || "error"));
        }
      });

      function call(method, params) {
        const id = String(++seq);
        return new Promise((resolve, reject) => {
          pending.set(id, { resolve, reject });
          window.parent.postMessage({ type: REQ, id, method, params }, "*");
          setTimeout(() => {
            if (pending.has(id)) {
              pending.delete(id);
              reject(new Error("timeout"));
            }
          }, 15000);
        });
      }

      document.getElementById("btnChapters").onclick = async () => {
        try {
          const ch = await call("getChapters");
          log("[getChapters] " + JSON.stringify(ch).slice(0, 500));
        } catch (e) {
          log(String(e));
        }
      };
      document.getElementById("btnChapterText").onclick = async () => {
        try {
          const t = await call("getCurrentChapterText", { maxChars: 2000 });
          log("[getCurrentChapterText] " + String(t).slice(0, 800));
        } catch (e) {
          log(String(e));
        }
      };
    </script>
  </body>
</html>
